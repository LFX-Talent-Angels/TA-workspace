name: Lint

on:
    pull_request:
        branches: [main]

jobs:
    lint-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            - name: Install Flake8
              run: |
                python -m pip install --upgrade pip
                pip install flake8
            
            - name: Run flake8
              run: flake8 .
